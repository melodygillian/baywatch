<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baywatch — fresh Bay Area listings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600&family=IBM+Plex+Mono:wght@400;500&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --fog: #eef1f2;
    --card: #ffffff;
    --ink: #16232b;
    --muted: #5c6b73;
    --hairline: #d7dde0;
    --orange: #c8442a;
    --orange-soft: #f8e9e4;
    --teal: #2e5e6b;
    --teal-soft: #e4eef0;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--fog);
    color: var(--ink);
    font-family: "Public Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    padding: 0 20px 80px;
  }
  a { color: inherit; }
  .wrap { max-width: 1060px; margin: 0 auto; }

  header { padding: 44px 0 20px; display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 18px; }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 600; font-size: clamp(28px, 4.5vw, 40px); letter-spacing: -0.02em;
  }
  h1 .accent { color: var(--orange); }
  .updated { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--muted); }
  .mock-note {
    width: 100%; margin-top: 10px; padding: 10px 14px;
    background: var(--orange-soft); border: 1px solid #ecc9bd; border-radius: var(--radius);
    font-size: 13.5px; color: #7c2f1d;
  }

  .filters {
    background: var(--card); border: 1px solid var(--hairline); border-radius: 14px;
    padding: 16px 18px; display: flex; flex-wrap: wrap; gap: 16px 26px; align-items: flex-end;
    box-shadow: 0 6px 18px rgba(22,35,43,0.06);
  }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field > label, .field > .label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  }

  .seg { display: inline-flex; border: 1px solid var(--hairline); border-radius: 999px; overflow: hidden; }
  .seg button {
    border: 0; background: transparent; padding: 8px 20px; cursor: pointer;
    font: 500 14px "Public Sans", sans-serif; color: var(--muted);
  }
  .seg button[aria-pressed="true"] { background: var(--ink); color: #fff; }

  input[type="text"], select {
    font: 500 14px "IBM Plex Mono", monospace; color: var(--ink);
    border: 1px solid var(--hairline); border-radius: var(--radius);
    padding: 8px 12px; background: var(--fog); width: 150px;
  }
  select { width: auto; }
  button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible {
    outline: 2px solid var(--orange); outline-offset: 2px;
  }

  .chips {
    display: flex; flex-wrap: wrap; gap: 7px; align-content: flex-start;
    max-width: 560px; max-height: 96px; overflow-y: auto;
    padding: 8px; border: 1px solid var(--hairline); border-radius: var(--radius);
    background: var(--fog);
  }
  .chip {
    border: 1px solid var(--hairline); background: var(--card); border-radius: 999px;
    padding: 5px 13px; font: 400 13px "Public Sans", sans-serif; color: var(--muted); cursor: pointer;
  }
  .chip[aria-pressed="true"] { background: var(--teal); border-color: var(--teal); color: #fff; }
  .clear-cities {
    border: 0; background: none; padding: 0; cursor: pointer;
    font: 500 11px "Public Sans", sans-serif; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--orange); text-decoration: underline;
  }

  .summary { margin: 26px 2px 14px; font-size: 14px; color: var(--muted); }
  .summary strong { color: var(--ink); font-weight: 500; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

  .card {
    background: var(--card); border: 1px solid var(--hairline); border-radius: 14px;
    padding: 18px 18px 16px; display: flex; flex-direction: column; gap: 10px; position: relative;
  }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .price { font: 500 22px "IBM Plex Mono", monospace; letter-spacing: -0.01em; }
  .price .per { font-size: 13px; color: var(--muted); font-weight: 400; }
  .tag {
    font: 500 11px "Public Sans", sans-serif; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 999px; white-space: nowrap;
  }
  .tag.sale { background: var(--fog); color: var(--ink); }
  .tag.rental { background: var(--teal-soft); color: var(--teal); }
  .new-badge {
    position: absolute; top: -9px; left: 16px;
    background: var(--orange); color: #fff; border-radius: 999px;
    font: 500 11px "Public Sans", sans-serif; letter-spacing: 0.06em; padding: 3px 11px;
  }
  .addr { font-weight: 500; font-size: 15px; }
  .desc { font-size: 13.5px; color: var(--muted); }
  .fresh { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
  .dots { display: flex; gap: 4px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hairline); }
  .dot.on { background: var(--orange); }
  .fresh span { font: 400 12px "IBM Plex Mono", monospace; color: var(--muted); }
  .card-links { display: flex; gap: 14px; margin-top: 4px; padding-top: 12px; border-top: 1px solid var(--hairline); }
  .card-links a { font-size: 13.5px; font-weight: 500; color: var(--teal); text-decoration: none; }
  .card-links a:hover { text-decoration: underline; }

  .empty {
    grid-column: 1 / -1; text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 15px;
  }
  .empty strong { color: var(--ink); }

  @media (prefers-reduced-motion: no-preference) {
    .card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(22,35,43,0.08); }
  }
  @media (max-width: 640px) {
    .filters { position: static; }
    input[type="text"] { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Bay<span class="accent">watch</span></h1>
    <span class="updated" id="updated"></span>
    <div class="mock-note" id="mockNote" hidden>
      Showing sample data. Once your GitHub Action runs with a RentCast key, real listings appear here automatically.
    </div>
  </header>

  <section class="filters" aria-label="Listing filters">
    <div class="field">
      <span class="label" id="kindLabel">Looking to</span>
      <div class="seg" role="group" aria-labelledby="kindLabel">
        <button id="btnBuy" aria-pressed="true">Buy</button>
        <button id="btnRent" aria-pressed="false">Rent</button>
      </div>
    </div>

    <div class="field">
      <label for="maxPrice">Max price</label>
      <input type="text" id="maxPrice" inputmode="numeric" placeholder="e.g. 1,500,000">
    </div>

    <div class="field">
      <label for="withinDays">Listed within</label>
      <select id="withinDays">
        <option value="1">1 day</option>
        <option value="3">3 days</option>
        <option value="7" selected>7 days</option>
      </select>
    </div>

    <div class="field">
      <span class="label"><span id="cityLabel">Cities (none = all)</span> <button class="clear-cities" id="clearCities" hidden>Clear</button></span>
      <div class="chips" id="cityChips" role="group" aria-labelledby="cityLabel"></div>
    </div>
  </section>

  <p class="summary" id="summary"></p>
  <main class="grid" id="grid"></main>
</div>

<script>
const state = { kind: "sale", maxPrice: null, withinDays: 7, cities: new Set(), listings: [] };
const $ = (id) => document.getElementById(id);
const DAY = 24 * 60 * 60 * 1000;

const fmtMoney = (n) => "$" + n.toLocaleString("en-US");

function daysAgo(iso) {
  return Math.max(0, Math.floor((Date.now() - Date.parse(iso)) / DAY));
}

function describe(l) {
  const bits = [];
  if (l.bedrooms) bits.push(l.bedrooms + " bed");
  if (l.bathrooms) bits.push(l.bathrooms + " bath");
  if (l.squareFootage) bits.push(l.squareFootage.toLocaleString() + " sq ft");
  const parts = [ (l.propertyType || "Home") + (bits.length ? " · " + bits.join(" · ") : "") ];
  const extras = [];
  if (l.yearBuilt) extras.push("built " + l.yearBuilt);
  if (l.lotSize) extras.push(l.lotSize.toLocaleString() + " sq ft lot");
  if (extras.length) parts.push(extras.join(", "));
  return parts.join(" — ");
}

function zillowUrl(l) {
  return "https://www.zillow.com/homes/" + encodeURIComponent(l.address.replace(/,/g, "").replace(/\s+/g, "-")) + "_rb/";
}
function googleUrl(l) {
  return "https://www.google.com/search?q=" + encodeURIComponent(l.address + (l.kind === "rental" ? " for rent" : " for sale"));
}

function card(l) {
  const age = daysAgo(l.listedDate);
  const dots = Array.from({ length: 7 }, (_, i) =>
    '<span class="dot' + (i >= age ? " on" : "") + '"></span>').join("");
  const isNew = age <= 1;
  return `
  <article class="card">
    ${isNew ? '<span class="new-badge">New ' + (age === 0 ? "today" : "yesterday") + "</span>" : ""}
    <div class="card-top">
      <span class="price">${fmtMoney(l.price)}${l.kind === "rental" ? ' <span class="per">/mo</span>' : ""}</span>
      <span class="tag ${l.kind}">${l.kind === "rental" ? "For rent" : "For sale"}</span>
    </div>
    <div class="addr">${l.address}</div>
    <div class="desc">${describe(l)}</div>
    <div class="fresh" title="Days of freshness remaining this week">
      <span class="dots">${dots}</span>
      <span>${age === 0 ? "listed today" : "listed " + age + "d ago"}</span>
    </div>
    <div class="card-links">
      <a href="${zillowUrl(l)}" target="_blank" rel="noopener">View on Zillow ↗</a>
      <a href="${googleUrl(l)}" target="_blank" rel="noopener">Search listing ↗</a>
    </div>
  </article>`;
}

function apply() {
  const cutoff = Date.now() - state.withinDays * DAY;
  const rows = state.listings.filter((l) =>
    l.kind === state.kind &&
    Date.parse(l.listedDate) >= cutoff &&
    (!state.maxPrice || l.price <= state.maxPrice) &&
    (state.cities.size === 0 || state.cities.has(l.city))
  );

  const noun = state.kind === "rental" ? "rental" : "home";
  $("summary").innerHTML = rows.length
    ? `<strong>${rows.length}</strong> ${noun}${rows.length === 1 ? "" : "s"} listed in the past ${state.withinDays} day${state.withinDays === 1 ? "" : "s"}` +
      (state.maxPrice ? " under <strong>" + fmtMoney(state.maxPrice) + "</strong>" : "") +
      (state.cities.size ? " in <strong>" + [...state.cities].join(", ") + "</strong>" : " across the Bay Area")
    : "";

  $("grid").innerHTML = rows.length
    ? rows.map(card).join("")
    : `<div class="empty"><strong>Nothing new matches these filters.</strong><br>
       Try raising the max price, adding cities, or widening the time window — new listings land every day.</div>`;
}

function syncCityLabel() {
  const n = state.cities.size;
  $("cityLabel").textContent = n ? `Cities · ${n} selected` : "Cities (none = all)";
  $("clearCities").hidden = n === 0;
}

function buildCityChips() {
  const cities = [...new Set(state.listings.map((l) => l.city))].sort();
  $("cityChips").innerHTML = cities.map((c) =>
    `<button class="chip" aria-pressed="false" data-city="${c}">${c}</button>`).join("");
  $("cityChips").addEventListener("click", (e) => {
    const b = e.target.closest(".chip");
    if (!b) return;
    const c = b.dataset.city;
    const on = !state.cities.has(c);
    state.cities[on ? "add" : "delete"](c);
    b.setAttribute("aria-pressed", String(on));
    syncCityLabel();
    apply();
  });
  $("clearCities").addEventListener("click", () => {
    state.cities.clear();
    document.querySelectorAll(".chip").forEach((b) => b.setAttribute("aria-pressed", "false"));
    syncCityLabel();
    apply();
  });
}

function setKind(kind) {
  state.kind = kind;
  $("btnBuy").setAttribute("aria-pressed", String(kind === "sale"));
  $("btnRent").setAttribute("aria-pressed", String(kind === "rental"));
  $("maxPrice").placeholder = kind === "rental" ? "e.g. 3,500" : "e.g. 1,500,000";
  apply();
}
$("btnBuy").addEventListener("click", () => setKind("sale"));
$("btnRent").addEventListener("click", () => setKind("rental"));

$("maxPrice").addEventListener("input", (e) => {
  const digits = e.target.value.replace(/[^0-9]/g, "");
  e.target.value = digits ? Number(digits).toLocaleString("en-US") : "";
  state.maxPrice = digits ? Number(digits) : null;
  apply();
});

$("withinDays").addEventListener("change", (e) => {
  state.withinDays = Number(e.target.value);
  apply();
});

fetch("data/listings.json?" + Date.now())
  .then((r) => r.json())
  .then((data) => {
    state.listings = data.listings || [];
    $("updated").textContent = "updated " + new Date(data.updatedAt).toLocaleString();
    $("mockNote").hidden = !data.mock;
    buildCityChips();
    apply();
  })
  .catch(() => {
    $("grid").innerHTML = `<div class="empty"><strong>Couldn't load listings data.</strong><br>
      Make sure data/listings.json exists in the repository.</div>`;
  });
</script>
</body>
</html>
